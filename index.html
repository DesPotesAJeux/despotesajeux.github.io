<!DOCTYPE html>
<html lang="fr">
<head>
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.gstatic.com https://apis.google.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
        font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
        img-src 'self' data: https://www.google.com https://*.google.com https://*.gstatic.com http://googleusercontent.com https://www.googletagmanager.com https://via.placeholder.com https://lh3.googleusercontent.com https://www.myludo.fr;
        connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://api.open-meteo.com https://*.googleapis.com https://*.firebaseio.com wss://*.firebaseio.com;
        object-src 'none';
        base-uri 'self';
        form-action 'self' https://*.firebaseapp.com;
        frame-src 'self' https://des-potes-a-jeux.firebaseapp.com;
    ">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Des Potes à Jeux</title>
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:image" content="https://despotesajeux.github.io/hero.png">

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700;800&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-beige: #f3f1e5;
            --text-brown: #4a4a4a;
            --green-deep: #3a6351;
            --wood-brown: #bc8f63; 
            --wood-highlight: #dbb38a;
            --fb-blue: #1877F2;
            --wa-green: #25D366; 
            --myludo-color: #2c3e50; 
            --gold-game: #d4af37;
            --president-color: #e67e22;
            --bg-image: url('images/backgrounds/hero_soir.png');
        }

        body {
            margin: 0; background-color: #1a1a1a; display: flex; justify-content: center; align-items: flex-start; 
            font-family: 'Quicksand', sans-serif; color: var(--text-brown); overflow: hidden;
            touch-action: manipulation; height: 100vh; height: 100dvh; 
        }

        .phone {
            width: 100%; max-width: 414px; height: 100%; background: var(--bg-beige); position: relative;
            overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            transition: all 0.4s ease;
        }

        .main-wrapper { display: flex; flex-direction: column; height: 100%; width: 100%; transition: filter 0.4s ease; }
        .main-wrapper.blurred { filter: blur(5px); }

        .hero-container { width: 100%; flex-shrink: 0; background: var(--bg-beige); position: relative; }
        .hero { 
            width: 100%; height: 360px; background: var(--bg-image) center top / cover no-repeat; 
            position: relative; z-index: 1; -webkit-user-select: none; user-select: none; pointer-events: none;
        }

        .rdv-card { background: rgba(255, 252, 240, 0.98); width: 85%; padding: 12px 15px; border-radius: 18px; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 30px rgba(74, 60, 47, 0.15); border: 1px solid white; z-index: 10; pointer-events: auto; cursor: default; }
        .rdv-info { width: 100%; display: flex; align-items: center; justify-content: center; }
        .rdv-info p { margin: 0; font-size: 0.9rem; font-weight: 700; color: var(--green-deep); line-height: 1.3; }
        .rdv-info a { color: var(--green-deep); text-decoration: none; font-weight: 600; font-size: 0.8rem; }
        .rdv-info a .underline { text-decoration: underline; }

        .content { background: var(--bg-beige); padding: 45px 0 20px 0; position: relative; flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .quote-box { padding: 15px 30px; text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .quote-text { font-family: 'Shadows Into Light', cursive; font-size: 1.5rem; line-height: 1.2; color: var(--green-deep); margin: 0; }
        .separator { width: 50px; height: 3px; background: var(--wood-highlight); margin: 12px auto; border-radius: 10px; opacity: 0.6; }

        .btn-ludotheque { background: var(--wood-brown); color: white; border: none; padding: 10px 22px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(188, 143, 99, 0.3); cursor: pointer; transition: transform 0.2s; }
        .btn-ludotheque:active { transform: scale(0.95); }

        .egg { position: absolute; color: rgba(188, 143, 99, 0.8); font-size: 1.6rem; cursor: pointer; z-index: 100; transition: all 0.3s cubic-bezier(0.17, 0.84, 0.44, 1); filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3)); }
        .egg:hover { color: var(--wood-brown); transform: scale(1.3); }
        .egg.found { color: #f1c40f; text-shadow: 0 0 15px rgba(241, 196, 15, 1); animation: diceFound 0.8s ease-in-out forwards; pointer-events: none; }
        
        @keyframes diceFound { 
            0% { transform: scale(1) rotate(0deg); opacity: 1; } 
            40% { transform: scale(1.5) rotate(360deg); opacity: 1; } 
            100% { transform: scale(0) rotate(720deg); opacity: 0; } 
        }

        .game-modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 300; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(4px); }
        .game-modal-backdrop.visible { opacity: 1; pointer-events: auto; }
        .game-modal-content { position: relative; width: 85%; max-width: 350px; background: var(--bg-beige); border: 4px solid var(--wood-brown); border-radius: 20px; padding: 15px 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); text-align: center; transform: scale(0.8); opacity: 0; transition: all 0.4s cubic-bezier(0.17, 0.84, 0.44, 1); display: flex; flex-direction: column; align-items: center; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 25; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .bottom-sheet { position: absolute; top: 100%; left: 0; width: 100%; height: auto; max-height: 85vh; min-height: 40vh; background: white; z-index: 30; border-top-left-radius: 35px; border-top-right-radius: 35px; display: flex; flex-direction: column; transition: transform 0.5s cubic-bezier(0.17, 0.84, 0.44, 1); }
        .bottom-sheet.open { transform: translateY(-100%); }
        .sheet-body { padding: 0 25px 40px; overflow-y: auto; flex-grow: 1; }
        .sheet-content-title { font-family: 'Shadows Into Light', cursive; color: var(--green-deep); font-size: 2.4rem; margin: 0 0 15px; text-align: center; }
        
        .game-btn { background: var(--wood-brown); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.95rem; cursor: pointer; box-shadow: 0 4px 10px rgba(188, 143, 99, 0.3); transition: transform 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; }
        .share-input { width: 100%; padding: 10px; border-radius: 12px; border: 2px solid var(--wood-brown); background: #fff; font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--text-brown); box-sizing: border-box; font-size: 0.95rem; margin-bottom: 10px; }
        .myludo-link { color: var(--green-deep); text-decoration: none; border-bottom: 1px dashed var(--wood-brown); }

        .footer-nav { width: 100%; background: var(--green-deep); display: flex; justify-content: space-around; align-items: center; padding: 15px 0; border-top: 3px solid var(--wood-brown); z-index: 20; }
        .icon-box { width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 14px; background: var(--wood-brown); margin-bottom: 6px; color: #ffffff; font-size: 1.3rem; box-shadow: 0 4px 8px rgba(0,0,0,0.25); }

        @media (min-width: 768px) {
            body { align-items: center; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), var(--bg-image) center / cover no-repeat; backdrop-filter: blur(10px); }
            .phone { max-width: 414px; height: 80vh; border-radius: 30px; }
            .bottom-sheet { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 90%; display: none; }
            .bottom-sheet.open { display: flex; transform: translate(-50%, -50%) scale(1); }
        }
    </style>

    <script>
        (function() {
            const now = new Date();
            const hour = now.getHours();
            let baseName = (hour >= 6 && hour < 12) ? "hero_matin" : (hour >= 12 && hour < 18) ? "hero_aprem" : "hero_soir";
            let condition = localStorage.getItem('plouay_weather') || "";
            document.documentElement.style.setProperty('--bg-image', `url('images/backgrounds/${baseName}${condition}.png')`);
        })();
    </script>
</head>
<body>

<div class="phone">
    <div class="game-modal-backdrop" id="gameModalBackdrop" onclick="closeGameModal()">
        <div class="game-modal-content" id="modalContent" onclick="event.stopPropagation()"></div>
    </div>

    <div class="overlay" id="overlay" onclick="closeSheet()"></div>
    
    <div class="main-wrapper" id="mainWrapper">
        <div class="hero-container">
            <div class="hero">
                <div class="hero-hitbox" onclick="askToPlay()"></div>
                <div class="rdv-card">
                    <div id="next-rdv-banner" style="width:100%;"></div>
                </div>
            </div>
        </div>

        <div class="content">
            <div id="homeEggContainer" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></div>
            <div class="quote-box">
                <p class="quote-text">"Ici on ne compte pas les points..."</p>
                <div class="separator"></div>
                <button class="btn-ludotheque" onclick="openSheet('ludotheque')">Découvrir nos jeux</button>
            </div>
        </div>

        <nav class="footer-nav">
            <div class="menu-item" onclick="openSheet('vote')"><div class="icon-box"><i class="fa-solid fa-check-to-slot"></i></div></div>
            <div class="menu-item" onclick="openSheet('histoire')"><div class="icon-box"><i class="fa-solid fa-layer-group"></i></div></div>
            <div class="menu-item" onclick="openSheet('cal')"><div class="icon-box"><i class="fa-solid fa-calendar-day"></i></div></div>
            <div class="menu-item" onclick="openSheet('contact')"><div class="icon-box"><i class="fa-solid fa-envelope"></i></div></div>
        </nav>
    </div>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-body" id="sheetBody"><div id="sheetContent"></div></div>
    </div>
</div>

<script>
    const sheet = document.getElementById('bottomSheet');
    const overlay = document.getElementById('overlay');
    const mainWrapper = document.getElementById('mainWrapper');

    const pagesData = {
        vote: { title: "Au programme ?", text: `<div id="content-vote">
            <div id="view-auth"></div>
            <div id="view-votes" style="display:none;">
                <div id="user-greeting" style="font-weight:bold; color:var(--green-deep); margin-bottom:15px;"></div>
                <div style="background:var(--bg-beige); padding:15px; border-radius:15px; margin-bottom:20px;">
                    <label style="font-weight:bold; font-size:0.8rem; display:block; margin-bottom:5px;">Proposer un jeu de l'asso :</label>
                    <select id="select-jeu-collection" class="share-input">
                        <option value="">Chargement de la collection...</option>
                    </select>
                    <button class="game-btn" style="width:100%;" onclick="proposerJeuSelectionne()">Proposer ce jeu</button>
                </div>
                <div id="liste-votes-firebase"></div>
            </div>
        </div>` },
        histoire: { title: "Histoire", text: "<p>L'aventure a commencé en 2014...</p>" },
        cal: { title: "Agenda", text: "<p>Le dernier vendredi du mois à 20h30.</p>" },
        contact: { title: "Contact", text: "<p>despotesajeux@protonmail.com</p>" },
        ludotheque: { title: "Ludothèques", text: "<p>Découvrez les collections de nos membres.</p>" }
    };

    function openSheet(key) {
        document.getElementById('sheetContent').innerHTML = `<h2 class="sheet-content-title">${pagesData[key].title}</h2>${pagesData[key].text}`;
        if(key === 'vote') setTimeout(() => { if(window.updateVoteUI) window.updateVoteUI(); }, 50);
        overlay.style.display = 'block';
        mainWrapper.classList.add('blurred');
        setTimeout(() => { overlay.style.opacity = '1'; sheet.classList.add('open'); }, 10);
        history.pushState({type:'sheet'}, '');
    }

    function hideSheetDOM() { sheet.classList.remove('open'); overlay.style.opacity = '0'; mainWrapper.classList.remove('blurred'); setTimeout(() => overlay.style.display = 'none', 250); }
    function closeSheet() { history.back(); }
    function closeGameModal() { history.back(); }
    function closeGameModalForce() { document.getElementById('gameModalBackdrop').classList.remove('visible'); }

    window.addEventListener('popstate', () => { if(sheet.classList.contains('open')) hideSheetDOM(); if(document.getElementById('gameModalBackdrop').classList.contains('visible')) closeGameModalForce(); });

    window.showCustomAlert = (t, m, i="fa-circle-info") => {
        document.getElementById('modalContent').innerHTML = `<div class="victory-icon" style="font-size:2.5rem; color:#bc8f63;"><i class="fa-solid ${i}"></i></div><h3>${t}</h3><p style="font-size:0.9rem;">${m}</p><button class="game-btn" onclick="closeGameModalForce()">Compris</button>`;
        document.getElementById('gameModalBackdrop').classList.add('visible');
        history.pushState({type:'gamemodal'}, '');
    };

    (function() {
        let d = new Date(); d.setDate(1); d.setMonth(d.getMonth()+1); d.setDate(0); while(d.getDay() !== 5) d.setDate(d.getDate()-1);
        document.getElementById('next-rdv-banner').innerHTML = `<span style="font-size:0.7rem; color:#bc8f63; font-weight:700;">PROCHAIN RDV</span><br><span style="font-size:0.9rem; font-weight:700; color:#3a6351;">Vendredi ${d.getDate()} à 20h30</span><div style="display:flex; justify-content:space-between; align-items:center; margin-top:3px;"><span style="font-size:0.8rem;">📍 Maison des Assos</span><button id="btn-voter-accueil" class="game-btn" style="padding:4px 12px; font-size:0.7rem; margin:0;" onclick="openSheet('vote')">Voter</button></div>`;
    })();

    let eggCount = 0;
    function askToPlay() { window.showCustomAlert("Joueur ?", "Trouve les 10 dés cachés !", "fa-dice"); }
    function foundEgg(el) { el.classList.add('found'); setTimeout(() => el.remove(), 800); eggCount++; if(eggCount === 1) window.showCustomAlert("Gagné !", "Tu as tout trouvé !"); }
    function createEgg(cont) { let egg = document.createElement('i'); egg.className = 'fa-solid fa-dice egg'; egg.style.top = Math.random()*70+15+'%'; egg.style.left = Math.random()*70+15+'%'; egg.onclick = function(){ foundEgg(this); }; cont.appendChild(egg); }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, arrayUnion, arrayRemove, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, sendEmailVerification, updateProfile, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const CODE_ASSO = "POTES56";
    const firebaseConfig = {
      apiKey: "AIzaSyBwLFuQcpv_Ml8omuhzEL1mvTEPlxsH1Wo",
      authDomain: "des-potes-a-jeux.firebaseapp.com",
      projectId: "des-potes-a-jeux",
      storageBucket: "des-potes-a-jeux.firebasestorage.app",
      messagingSenderId: "826161718904",
      appId: "1:826161718904:web:d2bb45b5cdadca5ca76f8d"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    auth.languageCode = 'fr';

    getRedirectResult(auth).catch(e => console.error(e));

    window.updateVoteUI = function() {
        const vAuth = document.getElementById('view-auth'), vVotes = document.getElementById('view-votes');
        if(!vAuth) return;
        if(auth.currentUser) {
            vAuth.style.display = 'none'; vVotes.style.display = 'block';
            document.getElementById('user-greeting').innerHTML = `Salut <b>${auth.currentUser.displayName || auth.currentUser.email}</b> !`;
            window.initFirebaseVotes(); window.chargerListeCollection();
        } else {
            vAuth.style.display = 'block'; vVotes.style.display = 'none'; window.renderAuthUI();
        }
    };

    window.renderAuthUI = function() {
        const authContainer = document.getElementById('auth-container');
        if (!authContainer) return;
        let html = '';
        if (window.authMode === 'register') {
            html = `<div style="display:flex; flex-direction:column; gap:8px; background:#fff; padding:15px; border-radius:15px; border:1px solid rgba(0,0,0,0.05); margin-top: 15px;">
                <input type="text" id="auth-secret" class="share-input" placeholder="Code secret de l'asso">
                <input type="text" id="auth-name" class="share-input" placeholder="Pseudo">
                <input type="email" id="auth-email" class="share-input" placeholder="Email">
                <input type="password" id="auth-pwd" class="share-input" placeholder="Mot de passe">
                <input type="password" id="auth-pwd-confirm" class="share-input" placeholder="Confirmer mot de passe">
                <button class="game-btn" onclick="registerEmail()">S'inscrire</button>
                <div style="text-align:center; margin: 5px 0; color:gray; font-size:0.8rem;">— ou —</div>
                <button class="game-btn" style="background:#4285F4;" onclick="registerGoogle()"><i class="fa-brands fa-google"></i> S'inscrire via Google</button>
                <span onclick="window.authMode='login'; renderAuthUI()" style="font-size:0.75rem; text-align:center; display:block; margin-top:10px; cursor:pointer; text-decoration:underline;">Déjà inscrit ? Connexion</span>
            </div>`;
        } else {
            html = `<div style="display:flex; flex-direction:column; gap:8px; background:#fff; padding:15px; border-radius:15px; border:1px solid rgba(0,0,0,0.05); margin-top: 15px;">
                <input type="email" id="auth-email" class="share-input" placeholder="Email">
                <input type="password" id="auth-pwd" class="share-input" placeholder="Mot de passe">
                <button class="game-btn" onclick="loginEmail()">Connexion</button>
                <div style="text-align:center; margin: 5px 0; color:gray; font-size:0.8rem;">— ou —</div>
                <button class="game-btn" style="background:#4285F4;" onclick="loginGoogle()"><i class="fa-brands fa-google"></i> Continuer avec Google</button>
                <div style="display:flex; justify-content:space-between; font-size:0.75rem; margin-top:10px;">
                    <span onclick="window.authMode='register'; renderAuthUI()" style="cursor:pointer; text-decoration:underline;">Créer un compte</span>
                    <span onclick="resetPwd()" style="cursor:pointer; text-decoration:underline;">Oublié ?</span>
                </div>
            </div>`;
        }
        authContainer.innerHTML = html;
    };

    window.authMode = 'login';
    window.loginGoogle = () => signInWithRedirect(auth, new GoogleAuthProvider());
    window.registerGoogle = () => {
        if(document.getElementById('auth-secret').value.trim().toUpperCase() !== CODE_ASSO) return window.showCustomAlert("Erreur", "Code secret invalide", "fa-user-shield");
        window.loginGoogle();
    };
    window.loginEmail = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pwd').value); } 
        catch (e) { window.showCustomAlert("Erreur", "Email ou mot de passe incorrect", "fa-circle-xmark"); }
    };
    window.registerEmail = async () => {
        const secret = document.getElementById('auth-secret').value.trim().toUpperCase();
        if(secret !== CODE_ASSO) return window.showCustomAlert("Refusé", "Code secret invalide", "fa-user-shield");
        if(document.getElementById('auth-pwd').value !== document.getElementById('auth-pwd-confirm').value) return window.showCustomAlert("Erreur", "Mots de passe différents", "fa-dice");
        try {
            const res = await createUserWithEmailAndPassword(auth, document.getElementById('auth-email').value, document.getElementById('auth-pwd').value);
            await updateProfile(res.user, { displayName: document.getElementById('auth-name').value });
            await sendEmailVerification(res.user);
            window.showCustomAlert("Succès", "Compte créé ! Vérifie tes spams.", "fa-champagne-glasses");
        } catch (e) { window.showCustomAlert("Erreur", e.code, "fa-bug"); }
    };
    window.logoutFirebase = () => signOut(auth);
    window.resetPwd = async () => {
        const mail = document.getElementById('auth-email').value;
        if(!mail) return window.showCustomAlert("Info", "Tape ton email d'abord", "fa-envelope");
        try { await sendPasswordResetEmail(auth, mail); window.showCustomAlert("Envoyé", "Vérifie tes spams.", "fa-paper-plane"); } catch(e) { window.showCustomAlert("Erreur", "Email inconnu", "fa-question"); }
    };

    // --- GESTION DE LA COLLECTION DE JEUX ---
    window.chargerListeCollection = async function() {
        const select = document.getElementById('select-jeu-collection');
        if(!select) return;

        const membres = ['sebastien', 'julie', 'ronan', 'carine', 'stephane', 'sylvain'];
        let tousLesJeux = [];

        for (const m of membres) {
            try {
                const snap = await getDocs(collection(db, `collection_${m}`));
                snap.forEach(d => {
                    tousLesJeux.push({ ...d.data(), proprio: m });
                });
            } catch(e) {}
        }

        tousLesJeux.sort((a, b) => a.titre.localeCompare(b.titre));

        let options = '<option value="">-- Sélectionner un jeu --</option>';
        tousLesJeux.forEach(j => {
            options += `<option value="${j.titre}" data-proprio="${j.proprio}" data-lien="${j.lien || ''}">${j.titre} (${j.proprio})</option>`;
        });
        select.innerHTML = options;
    };

    window.proposerJeuSelectionne = async function() {
        const select = document.getElementById('select-jeu-collection');
        const opt = select.options[select.selectedIndex];
        const titre = select.value;
        if(!titre) return window.showCustomAlert("Attention", "Choisis un jeu !", "fa-hand-pointer");

        await addDoc(collection(db, "jeux_proposes"), { 
            nom: titre, 
            votants: [auth.currentUser.uid], 
            proposePar: auth.currentUser.displayName, 
            appartientA: opt.getAttribute('data-proprio'),
            myludoLien: opt.getAttribute('data-lien'),
            date: new Date() 
        });
        window.showCustomAlert("Succès", "Jeu ajouté aux votes !");
    };

    onAuthStateChanged(auth, (user) => { window.updateVoteUI(); });

    window.initFirebaseVotes = function() {
        if(!window.db) return;
        onSnapshot(collection(db, "jeux_proposes"), (snap) => {
            const div = document.getElementById('liste-votes-firebase');
            if(!div) return;
            let jeux = [];
            snap.forEach(d => jeux.push({ id: d.id, ...d.data() }));
            jeux.sort((a, b) => (b.votants || []).length - (a.votants || []).length);
            
            div.innerHTML = jeux.map(j => {
                const votants = j.votants || [];
                const vted = auth.currentUser && votants.includes(auth.currentUser.uid);
                const titreHTML = j.myludoLien 
                    ? `<a href="${j.myludoLien}" target="_blank" class="myludo-link">${j.nom}</a>`
                    : j.nom;

                return `<div style="display:flex; justify-content:space-between; align-items:center; background:#fff; padding:12px; border-radius:15px; border:1px solid #dbb38a; margin-bottom:10px; box-shadow:0 2px 5px rgba(0,0,0,0.02);">
                    <div>
                        <div style="font-weight:800; color:#3a6351; font-size:0.95rem;">${titreHTML}</div>
                        <span style="font-size:0.6rem; color:gray;">Proposé par ${j.proposePar} (Jeu de ${j.appartientA})</span>
                    </div>
                    <button class="call-btn ${vted ? 'fb-btn' : 'ludo-btn'}" onclick="voterPourJeu('${j.id}', ${vted})" style="width:auto; padding:0 12px; border-radius:10px;">${vted ? '✅' : '👍'} ${votants.length}</button>
                </div>`;
            }).join('') || '<div style="text-align:center; font-size:0.8rem; color:gray; margin-top:20px;">Aucun jeu proposé pour le moment.</div>';
        });
    };

    window.voterPourJeu = async (id, vted) => {
        if(!auth.currentUser) return;
        const ref = doc(db, "jeux_proposes", id);
        await updateDoc(ref, { votants: vted ? arrayRemove(auth.currentUser.uid) : arrayUnion(auth.currentUser.uid) });
    };
</script>
</body>
</html>
