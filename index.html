<!DOCTYPE html>
<html lang="fr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YPHH9PELKY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-YPHH9PELKY');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Des Potes à Jeux</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-beige: #f3f1e5;
            --text-brown: #4a4a4a;
            --green-deep: #3a6351;
            --wood-brown: #bc8f63; 
            --wood-highlight: #dbb38a; 
        }

        body {
            margin: 0; background-color: #1a1a1a;
            display: flex; justify-content: center;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-brown);
        }

        .phone {
            width: 100%; max-width: 414px; 
            min-height: 100vh; min-height: 100dvh;
            background: var(--bg-beige); position: relative;
            display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* --- WRAPPER --- */
        .main-wrapper {
            display: flex; flex-direction: column; flex-grow: 1;
            transition: filter 0.4s ease;
            padding-bottom: 90px; /* Espace pour le footer fixe */
        }
        .main-wrapper.blurred { filter: blur(5px); }

        /* --- HERO --- */
        .hero-container { width: 100%; flex-shrink: 0; background: var(--bg-beige); position: relative; }
        .hero { 
            width: 100%; height: 360px;
            background: url('hero.png') center top / contain no-repeat; 
            position: relative; z-index: 1; 
        }

        .rdv-card {
            background: rgba(255, 252, 240, 0.98); width: 85%;
            padding: 12px 15px; border-radius: 18px;
            position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%); display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(74, 60, 47, 0.15); border: 1px solid white;
            z-index: 10;
        }

        .rdv-info p { margin: 0; font-size: 0.9rem; font-weight: 700; color: var(--green-deep); }

        /* --- CONTENU --- */
        .content {
            padding: 60px 0 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .quote-box { padding: 20px 35px; text-align: center; }
        .quote-text {
            font-family: 'Shadows Into Light', cursive; font-size: 1.6rem;
            line-height: 1.2; color: var(--green-deep); margin: 0;
        }
        .separator { width: 50px; height: 3px; background: var(--wood-highlight); margin: 15px auto; border-radius: 10px; opacity: 0.6; }

        /* --- FOOTER FIXE --- */
        .footer-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 414px;
            background: var(--green-deep); display: flex; justify-content: space-around;
            align-items: center; padding: 12px 0 20px 0; 
            border-top: 3px solid var(--wood-brown); z-index: 20;
        }
        .menu-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; }
        .icon-box { 
            width: 42px; height: 42px; display: flex; justify-content: center; align-items: center; 
            border-radius: 12px; background: var(--wood-brown); margin-bottom: 4px; 
            color: #ffffff; font-size: 1.2rem; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .menu-item span { font-weight: 700; font-size: 0.55rem; color: #ffffff; text-transform: uppercase; }

        /* --- BOTTOM SHEET --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 25; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .bottom-sheet { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 85vh; 
            background: white; z-index: 30; border-top-left-radius: 30px; border-top-right-radius: 30px; 
            display: flex; flex-direction: column; transition: bottom 0.5s cubic-bezier(0.17, 0.84, 0.44, 1);
            max-width: 414px; left: 50%; transform: translateX(-50%);
        }
        .bottom-sheet.open { bottom: 0; }

        .sheet-header { width: 100%; padding: 15px 0; flex-shrink: 0; }
        .sheet-handle { width: 40px; height: 5px; background: #e0e0e0; border-radius: 10px; margin: 0 auto; }
        .sheet-body { padding: 0 25px 40px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }
        .sheet-content-title { font-family: 'Shadows Into Light', cursive; color: var(--green-deep); font-size: 2.4rem; text-align: center; margin: 10px 0; }

        /* --- UI ELEMENTS (Calendrier, etc) --- */
        .cal-list { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        .cal-item { display: flex; align-items: center; gap: 15px; background: var(--bg-beige); padding: 12px; border-radius: 15px; border-left: 4px solid var(--wood-brown); }
        .cal-item .date { font-weight: 700; color: var(--green-deep); text-transform: capitalize; }
        
        .contact-card { background: var(--bg-beige); padding: 20px; border-radius: 15px; margin: 20px 0; }
        .btn-whatsapp { background: #25D366; color: white; padding: 15px; border-radius: 50px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; font-weight: 700; margin-top: 10px;}

        /* --- LIGHTBOX --- */
        .lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .lightbox.active { opacity: 1; display: flex; }
        .lightbox img { max-width: 90%; max-height: 80%; border: 3px solid white; border-radius: 10px; }

        @media (min-width: 768px) {
            .footer-nav, .bottom-sheet { max-width: 700px; }
            .phone { max-width: 700px; }
        }
    </style>
</head>
<body>

<div class="phone">
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <img id="lightboxImg" src="" alt="Aperçu">
    </div>

    <div class="overlay" id="overlay" onclick="closeSheet()"></div>
    
    <div class="main-wrapper" id="mainWrapper">
        <div class="hero-container">
            <div class="hero">
                <div class="rdv-card">
                    <div style="font-size: 1.5rem; margin-right: 12px;">🎲</div>
                    <div class="rdv-info">
                        <b style="font-size:0.7rem; color:var(--wood-brown); text-transform:uppercase;">Prochain Rdv</b>
                        <p id="next-rdv-banner">Calcul en cours...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="quote-box">
                <p class="quote-text">"Ici on ne compte pas les points,<br>on compte les <strong>souvenirs</strong>."</p>
                <div class="separator"></div>
                <p style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; opacity: 0.4; line-height: 1.5;">Association loi 1901<br>Plouay • Bretagne</p>
            </div>
        </div>

        <nav class="footer-nav">
            <div class="menu-item" onclick="openSheet('histoire')"><div class="icon-box"><i class="fa-solid fa-book-open"></i></div><span>Histoire</span></div>
            <div class="menu-item" onclick="openSheet('cal')"><div class="icon-box"><i class="fa-solid fa-calendar-day"></i></div><span>Agenda</span></div>
            <div class="menu-item" onclick="openSheet('adhesion')"><div class="icon-box"><i class="fa-solid fa-user-check"></i></div><span>Adhésion</span></div>
            <div class="menu-item" onclick="openSheet('photos')"><div class="icon-box"><i class="fa-solid fa-camera-retro"></i></div><span>Photos</span></div>
            <div class="menu-item" onclick="openSheet('contact')"><div class="icon-box"><i class="fa-solid fa-envelope"></i></div><span>Contact</span></div>
        </nav>
    </div>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-header"><div class="sheet-handle"></div></div>
        <div class="sheet-body" id="sheetBody"><div id="sheetContent"></div></div>
    </div>
</div>

<script>
    // --- CALCUL DATE AUTO ---
    function getNextLastFridays() {
        let dates = [];
        let now = new Date();
        let year = now.getFullYear();
        let month = now.getMonth();
        while (dates.length < 5) {
            let d = new Date(year, month + 1, 0);
            while (d.getDay() !== 5) { d.setDate(d.getDate() - 1); }
            let checkDate = new Date(d); checkDate.setHours(23, 59, 59);
            if (checkDate >= now) { dates.push(new Date(d)); }
            month++;
        }
        return dates;
    }

    const upcomingDates = getNextLastFridays();
    const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
    document.getElementById('next-rdv-banner').innerText = upcomingDates[0].toLocaleDateString('fr-FR', dateOptions);

    let agendaHTML = '<div class="cal-list">' + upcomingDates.map(date => `
        <div class="cal-item">
            <i class="fa-regular fa-calendar-check" style="color: var(--wood-brown); font-size: 1.2rem;"></i>
            <div>
                <div class="date">${date.toLocaleDateString('fr-FR', dateOptions)}</div>
                <div class="time" style="font-size:0.8rem;">à 20h30 • Maison des Assos</div>
            </div>
        </div>`).join('') + '</div>';

    const pagesData = {
        histoire: { title: "Le Grimoire", text: `<p style="text-align:center">Club né en 2019 à Plouay. Passionnés de jeux de société modernes, nous partageons nos boîtes et nos rires chaque mois.</p>` },
        cal: { title: "Agenda", text: `<p style="text-align:center">Chaque dernier vendredi du mois :</p>${agendaHTML}` },
        adhesion: { title: "Adhésion", text: `<div style="text-align:center"><p>15€ / an (Solo)<br>20€ / an (Couple)</p><p style="font-size:0.8rem">Première séance découverte offerte !</p></div>` },
        photos: { title: "Photos", text: `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">${Array.from({length: 6}, (_, i) => `<img src="photo${i+1}.jpg" onclick="openLightbox(this.src)" style="width:100%; border-radius:10px;">`).join('')}</div>` },
        contact: { title: "Contact", text: `<div class="contact-card"><p>📞 06 20 03 17 71</p><p>📧 despotesajeux@protonmail.com</p></div><a href="https://chat.whatsapp.com/GE6whGWavky2alGNskA5yL" target="_blank" class="btn-whatsapp">Rejoindre le WhatsApp</a>` }
    };

    function openSheet(key) {
        document.getElementById('sheetContent').innerHTML = `<h2 class="sheet-content-title">${pagesData[key].title}</h2>${pagesData[key].text}`;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('mainWrapper').classList.add('blurred');
        setTimeout(() => { 
            document.getElementById('overlay').style.opacity = '1'; 
            document.getElementById('bottomSheet').classList.add('open');
        }, 10);
    }

    function closeSheet() {
        document.getElementById('bottomSheet').classList.remove('open');
        document.getElementById('overlay').style.opacity = '0';
        document.getElementById('mainWrapper').classList.remove('blurred');
        setTimeout(() => { document.getElementById('overlay').style.display = 'none'; }, 300);
    }

    function openLightbox(src) {
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').classList.add('active');
    }
    function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
</script>
</body>
</html>
