<script>
    /* --- LOGIQUE JEU EASTER EGGS --- */
    let gameStarted = false;
    let eggCount = 0;
    const totalEggs = 10;
    let timerInterval;
    let startTime;
    
    // On stocke les données finales ici
    let finalGameData = { time: "", rank: "", rawMs: 0 }; 
    
    let gameState = {
        'home': { total: 0, found: 0 }, 'histoire': { total: 0, found: 0 },
        'adhesion': { total: 0, found: 0 }, 'cal': { total: 0, found: 0 },
        'photos': { total: 0, found: 0 }, 'contact': { total: 0, found: 0 },
        'ludotheque': { total: 0, found: 0 }

    function askToPlay() {
        if(gameStarted) return;
        // Reset Textes
        document.getElementById('gameTitle').innerText = "Psst... Joueur ?";
        document.getElementById('gameDesc').innerHTML = "Comme on est joueurs, <b>10 petits dés</b> ont été cachés subtilement dans tout le site (Accueil, Histoire, Photos...).<br><br>Sauras-tu tous les retrouver ?";
        
        // Reset Boutons
        let btn = document.getElementById('gameBtn');
        btn.innerText = "C'est parti !";
        btn.setAttribute('onclick', 'initGame()');
        btn.style.display = 'block';
        
        document.getElementById('shareContainer').style.display = 'none'; 
        document.getElementById('gameModalBackdrop').classList.add('visible');
    }
    
    function closeGameModal() {
        document.getElementById('gameModalBackdrop').classList.remove('visible');
    }
    
    function initGame() {
        document.getElementById('gameModalBackdrop').classList.remove('visible');
        resetGameData();
        gameStarted = true;
        startTimer();
        
        // Distribution aléatoire
        const sections = ['histoire', 'adhesion', 'cal', 'photos', 'contact', 'ludotheque'];
        for(let i=0; i<9; i++) {
            let randomSec = sections[Math.floor(Math.random() * sections.length)];
            gameState[randomSec].total++;
        }
        gameState['home'].total = 1; // Toujours 1 sur l'accueil
        
        renderHomeEgg();
        showToast("Le chrono est lancé ! ⏱️");
    }
    
    function resetGameData() {
        gameStarted = false;
        eggCount = 0;
        clearInterval(timerInterval);
        document.getElementById('gameTimer').classList.remove('visible');
        document.getElementById('gameTimer').innerText = "00:00:00";
        document.getElementById('gameTimer').style.color = '#f1c40f'; 
        for(let key in gameState) { gameState[key].total = 0; gameState[key].found = 0; }
        document.querySelectorAll('.egg').forEach(el => el.remove());
    }
    
    function startTimer() {
        startTime = Date.now();
        document.getElementById('gameTimer').classList.add('visible');
        timerInterval = setInterval(() => {
            let delta = Date.now() - startTime;
            let minutes = Math.floor(delta / 60000);
            let seconds = Math.floor((delta % 60000) / 1000);
            let centiseconds = Math.floor((delta % 1000) / 10);
            document.getElementById('gameTimer').innerText = 
                (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                (seconds < 10 ? "0" + seconds : seconds) + ":" + 
                (centiseconds < 10 ? "0" + centiseconds : centiseconds);
        }, 10);
    }
    
    function foundEgg(el, sectionKey) {
        if(el.classList.contains('found')) return;
        if(eggCount >= 10) return;
        
        gameState[sectionKey].found++;
        eggCount++;
        
        // Animation
        el.style.pointerEvents = 'none'; 
        el.classList.add('found'); 
        setTimeout(() => {
            el.style.transition = "all 0.5s ease"; el.style.opacity = "0"; el.style.transform = "scale(0)";
            setTimeout(() => el.remove(), 500); 
        }, 600);
        
        if(eggCount === totalEggs) {
            clearInterval(timerInterval);
            let rawMs = Date.now() - startTime;
            finishGame(rawMs);
        } else {
            showToast(`Bravo ! ${eggCount}/${totalEggs}`);
        }
        if(navigator.vibrate) navigator.vibrate(50);
    }

    // --- ALGORITHME ANTI-TRICHE SIMPLE ---
    // Génère un code hexadécimal basé sur le temps exact en ms
    function generateChecksum(ms) {
        // Formule arbitraire pour brouiller les pistes
        return Math.floor((ms * 17) + 2026).toString(36).toUpperCase();
    }
    
    function finishGame(rawMs) {
        let finalTime = document.getElementById('gameTimer').innerText;
        document.getElementById('gameTimer').style.color = '#2ecc71'; 
        
        let seconds = rawMs / 1000;
        let rank = ""; 
        let message = "";

        // Attribution des Rangs
        if (seconds < 5) { rank = "LE DIEU DU DÉ ⚡"; message = "T'as triché ou t'es un robot ? C'est inhumain !"; }
        else if (seconds < 10) { rank = "LUCKY LUKE 🤠"; message = "Tu cliques plus vite que ton ombre !"; }
        else if (seconds < 15) { rank = "GRAND MAÎTRE 🥋"; message = "Tes réflexes sont affûtés comme des lames."; }
        else if (seconds < 20) { rank = "ŒIL DE LYNX 😼"; message = "Vif et précis, rien ne t'échappe !"; }
        else if (seconds < 30) { rank = "SHERLOCK HOLMES 🕵️‍♂️"; message = "Une enquête menée avec méthode et brio."; }
        else if (seconds < 40) { rank = "LE TOURISTE 📸"; message = "Tu as pris le temps d'admirer le paysage."; }
        else if (seconds < 50) { rank = "LE DIESEL 🚜"; message = "Un peu lent au démarrage, mais tu es arrivé !"; }
        else if (seconds < 60) { rank = "LE PARESSEUX 🦥"; message = "Tout doux, pas de stress, c'est les vacances."; }
        else { rank = "L'ESCARGOT 🐌"; message = "L'important, c'est de participer... non ?"; }
        
        // Sauvegarde des données
        finalGameData.time = finalTime;
        finalGameData.rank = rank;
        finalGameData.rawMs = rawMs;

        setTimeout(() => {
            document.getElementById('gameTitle').innerText = "🎉 GAGNÉ ! 🎉";
            document.getElementById('gameDesc').innerHTML = `Tu as trouvé les 10 dés en <b>${finalTime}</b>.<br><br><span style="color:var(--green-deep); font-weight:bold; font-size:1.1rem; text-transform:uppercase;">${rank}</span><br><span style="font-size:0.9rem; opacity:0.8;">${message}</span>`;
            
            document.getElementById('shareContainer').style.display = 'flex';
            
            let btn = document.getElementById('gameBtn');
            btn.innerText = "Rejouer 🔄";
            btn.setAttribute('onclick', 'initGame()');
            
            document.getElementById('gameModalBackdrop').classList.add('visible');
        }, 1000);
    }
    
    function shareWhatsapp() {
        let pseudo = document.getElementById('playerPseudo').value.trim() || "Un Pote";
        let check = generateChecksum(finalGameData.rawMs);

        // Construction du message WhatsApp optimisé
        let text = `🎲 *DÉFI DES POTES À JEUX* 🎲%0A%0A` +

    function renderHomeEgg() {
        let container = document.getElementById('homeEggContainer');
        container.innerHTML = ''; 
        if(gameState['home'].total > gameState['home'].found) createEgg(container, 'home', false);
    }
    
    function createEgg(container, sectionKey, isFound, isRelative = false) {
        let egg = document.createElement('i');
        egg.className = 'fa-solid fa-dice egg';
        
        if (isFound) return; 

        egg.onclick = function() { foundEgg(this, sectionKey); event.stopPropagation(); };

        if(!isRelative) {
            egg.style.top = (Math.random() * 80 + 10) + '%';
            egg.style.left = (Math.random() * 80 + 10) + '%';
        } else {
            egg.style.position = 'relative'; egg.style.marginLeft = '15px'; egg.style.verticalAlign = 'middle';
        }
        container.appendChild(egg);
    }

    /* --- RESTE DU CODE SITE (Navigation, etc) --- */
    const NB_PHOTOS_SORTIES = 19; const NB_PHOTOS_JEUX = 20;

    function getNextLastFridays() {
        let dates = []; let now = new Date(); let currentYear = now.getFullYear(); let currentMonth = now.getMonth();
        while (dates.length < 4) {
            let d = new Date(currentYear, currentMonth + 1, 0); 
            while (d.getDay() !== 5) { d.setDate(d.getDate() - 1); }
            let checkDate = new Date(d); checkDate.setHours(23, 59, 59);
            if (checkDate >= now) { dates.push(new Date(d)); }
            currentMonth++;
        }
        return dates;
    }

            </div>`
        },
        adhesion: { 
            title: "Rejoindre l'asso", 
            text: `<div class="panel-card" id="content-adhesion">
                <p style="text-align:center; margin-top:0;">Devenir membre est simple et convivial !</p>
                <div style="background: rgba(220, 53, 69, 0.1); border: 1px solid rgba(220, 53, 69, 0.2); color: #dc3545; padding: 10px 15px; border-radius: 12px; text-align: center; font-weight: 700; margin: 15px auto; max-width: 280px; font-size: 0.9rem;"><i class="fa-solid fa-triangle-exclamation"></i> Autorisé aux plus de 18 ans</div>
                <div class="pricing-container"><div class="price-card featured"><div class="amount">15€<span style="font-size:0.8rem; opacity:0.6;">/an</span></div><p style="font-size:0.65rem; margin:0;">Solo</p></div><div class="price-card featured"><div class="amount">20€<span style="font-size:0.8rem; opacity:0.6;">/an</span></div><p style="font-size:0.65rem; margin:0;">Couple</p></div></div>
                <ul class="benefits-list" style="max-width: 280px; margin: 15px auto 0;"><li><i class="fa-solid fa-circle-check"></i> Accès illimité aux soirées</li><li><i class="fa-solid fa-circle-check"></i> Première séance offerte</li><li><i class="fa-solid fa-circle-check"></i> Soirée escape game</li><li><i class="fa-solid fa-circle-check"></i> Repas de fin d'année</li><li><i class="fa-solid fa-circle-check"></i> Après-midi jeux extérieurs</li></ul>
            </div>`
        },
        cal: { title: "Agenda Ludique", text: `<div class="panel-card" id="content-cal"><p style="text-align: center; color: var(--green-deep); margin-top: 0; font-size: 0.95rem;">On se retrouve chaque <b>dernier vendredi du mois</b>. Voici les prochaines sessions :</p>${agendaHTML}<p style="text-align: center; font-size:0.8rem; margin-bottom: 0;">N'oubliez pas d'apporter votre bonne humeur !</p></div>` },
        photos: { title: "Souvenirs", text: `<div class="panel-card" id="content-photos" style="padding-left: 0; padding-right: 0; padding-bottom: 0; overflow: hidden; position: relative;"><h3 id="photo-title-1" class="photo-section-title first">Les Sorties</h3>${photosSortiesHTML}<h3 id="photo-title-2" class="photo-section-title">Les Jeux</h3>${photosJeuxHTML}</div>` },
        contact: { 
            title: "Nous Contacter", 
            text: `<div class="panel-card" id="content-contact">
                <div class="contact-person"><div class="contact-top"><div class="avatar"><i class="fa-solid fa-user"></i></div><h4>Julie</h4><a href="tel:+33620031771" class="call-btn">Appeler</a></div><div class="contact-bottom"><span>Présidente de l'association</span></div></div>
                <div class="contact-person"><div class="contact-top"><div class="avatar mail-icon"><i class="fa-solid fa-envelope-open-text"></i></div><h4>Email</h4><a href="mailto:despotesajeux@protonmail.com" class="call-btn mail-btn">Écrire</a></div><div class="contact-bottom"><span>Pour toute question ou demande</span></div></div>
                <div class="contact-person"><div class="contact-top"><div class="avatar fb-icon"><i class="fa-brands fa-facebook-f"></i></div><h4>Facebook</h4><a href="https://www.facebook.com/groups/despotesajeux/" target="_blank" class="call-btn fb-btn">Rejoindre</a></div><div class="contact-bottom"><span>Pour suivre la communauté en ligne</span></div></div>
                <div class="contact-person"><div class="contact-top"><div class="avatar wa-icon"><i class="fa-brands fa-whatsapp"></i></div><h4>WhatsApp</h4><a href="https://chat.whatsapp.com/GE6whGWavky2alGNskA5yL?mode=gi_t" target="_blank" class="call-btn wa-btn">Papoter</a></div><div class="contact-bottom"><span>Rejoindre le groupe de discussion</span></div></div>
            </div>` 
        },
        ludotheque: { 
            title: "Nos Ludothèques", 
            text: `<div class="panel-card" id="content-ludotheque">
                <p style="text-align: center; margin-top: 0; margin-bottom: 10px; font-size: 0.95rem; line-height: 1.5;">Collections de nos membres sur <b>Myludo</b>.</p>
                <div class="contact-person compact-item"><div class="contact-top"><div class="avatar ludo-icon"><img src="https://www.google.com/s2/favicons?domain=myludo.fr&sz=128" alt="Myludo"></div><h4>Ronan</h4><a href="https://www.myludo.fr/#!/profil/ronan-29-67622" target="_blank" class="call-btn ludo-btn">Voir</a></div><div class="contact-bottom"><span>Collection de Ronan</span></div></div>
                <div class="contact-person compact-item"><div class="contact-top"><div class="avatar ludo-icon"><img src="https://www.google.com/s2/favicons?domain=myludo.fr&sz=128" alt="Myludo"></div><h4>Sébastien</h4><a href="https://www.myludo.fr/#!/profil/sebastien-g-107305" target="_blank" class="call-btn ludo-btn">Voir</a></div><div class="contact-bottom"><span>Collection de Sébastien</span></div></div>
                <div class="contact-person compact-item"><div class="contact-top"><div class="avatar ludo-icon"><img src="https://www.google.com/s2/favicons?domain=myludo.fr&sz=128" alt="Myludo"></div><h4>Stéphane</h4><a href="https://www.myludo.fr/#!/profil/stephane-rio-26496" target="_blank" class="call-btn ludo-btn">Voir</a></div><div class="contact-bottom"><span>Collection de Stéphane</span></div></div>
                <div class="contact-person compact-item"><div class="contact-top"><div class="avatar ludo-icon"><img src="https://www.google.com/s2/favicons?domain=myludo.fr&sz=128" alt="Myludo"></div><h4>Sylvain</h4><a href="https://www.myludo.fr/#!/profil/sylvain-bedouet-64234" target="_blank" class="call-btn ludo-btn">Voir</a></div><div class="contact-bottom"><span>Collection de Sylvain</span></div></div>
            </div>` 
        }
    };

    const sheet = document.getElementById('bottomSheet');
    const overlay = document.getElementById('overlay');
    const sheetContent = document.getElementById('sheetContent');
    const sheetBody = document.getElementById('sheetBody');
    const mainWrapper = document.getElementById('mainWrapper');

    function openSheet(key) {
        sheetContent.innerHTML = `<h2 class="sheet-content-title">${pagesData[key].title}</h2>${pagesData[key].text}`;
        
        if(gameStarted && gameState[key].total > gameState[key].found) {
            let containerId = `content-${key}`;
            let container = document.getElementById(containerId);
            
            if(container) {
                let remaining = gameState[key].total - gameState[key].found;
                if(key === 'photos') {
                    let titles = container.querySelectorAll('.photo-section-title');
                    for(let i=0; i<remaining; i++) {
                        let target = titles[i % titles.length];
                        createEgg(target, key, false, true);
                    }
                } else {
                    container.style.position = 'relative';
                    for(let i=0; i<remaining; i++) {
                        createEgg(container, key, false, false);
                    }
                }
            }
        }
        
        overlay.style.display = 'block'; mainWrapper.classList.add('blurred');
        if (window.innerWidth <= 768) { sheet.style.transition = 'none'; sheet.style.transform = ''; void sheet.offsetWidth; sheet.style.transition = "transform 0.5s cubic-bezier(0.17, 0.84, 0.44, 1)"; }
        setTimeout(() => { overlay.style.opacity = '1'; sheet.classList.add('open'); }, 10);
        if (!history.state || history.state.type !== 'sheet') { history.pushState({ type: 'sheet' }, ''); }
    }

    function hideSheetDOM() { if (window.innerWidth <= 768) { sheet.style.transition = "transform 0.25s ease-in"; } sheet.style.transform = ''; sheet.classList.remove('open'); overlay.style.opacity = '0'; mainWrapper.classList.remove('blurred'); setTimeout(() => { overlay.style.display = 'none'; }, 250); }
    function closeSheet() { if (!sheet.classList.contains('open')) return; if (history.state && history.state.type === 'sheet') { history.back(); } else { hideSheetDOM(); } }
    overlay.onclick = () => closeSheet();

    let startY = 0; let isDragging = false;
    sheet.addEventListener('touchstart', (e) => { if (window.innerWidth > 768) return; if (sheetBody.scrollTop <= 0) { startY = e.touches[0].clientY; isDragging = true; sheet.style.transition = 'none'; } }, { passive: true });
    sheet.addEventListener('touchmove', (e) => { if (!isDragging || window.innerWidth > 768) return; let diff = e.touches[0].clientY - startY; if (diff > 0) { e.preventDefault(); sheet.style.transform = `translateY(calc(-100% + ${diff}px))`; } }, { passive: false });
    sheet.addEventListener('touchend', (e) => { if (!isDragging || window.innerWidth > 768) return; isDragging = false; let diff = e.changedTouches[0].clientY - startY; sheet.style.transition = "transform 0.3s cubic-bezier(0.17, 0.84, 0.44, 1)"; if (diff > 100) { closeSheet(); } else { sheet.style.transform = ''; } });

    const lb = document.getElementById('lightbox'); const lbContainer = document.getElementById('lbContainer'); const lbImg = document.getElementById('lightboxImg'); const lbNavPrev = document.getElementById('lbNavPrev'); const lbNavNext = document.getElementById('lbNavNext');
    let currentScale = 1; let initialDistance = null; let isZooming = false; let posX = 0, posY = 0; let lastPanX = 0, lastPanY = 0; let swipeStartX = 0; let currentSwipeX = 0; 
    function openLightbox(src, isSingleImage = false) { lbImg.src = src; lb.style.display = 'flex'; resetZoom(); setTimeout(() => lb.classList.add('active'), 10); if (isSingleImage) { currentGallery = [src]; currentPhotoIndex = 0; lbNavPrev.style.display = 'none'; lbNavNext.style.display = 'none'; } else { const imgs = document.querySelectorAll('.photo-grid img'); currentGallery = Array.from(imgs).map(i => i.getAttribute('src')); currentPhotoIndex = currentGallery.indexOf(src); if (currentGallery.length > 1) { lbNavPrev.style.display = 'flex'; lbNavNext.style.display = 'flex'; } else { lbNavPrev.style.display = 'none'; lbNavNext.style.display = 'none'; } } if (!history.state || history.state.type !== 'lightbox') { history.pushState({type: 'lightbox'}, ''); } }
    function hideLightboxDOM() { lb.classList.remove('active'); setTimeout(() => { lb.style.display='none'; resetZoom(); }, 300); }
    function closeLightboxForce(fromHistory = false) { if (!lb.classList.contains('active')) return; if (history.state && history.state.type === 'lightbox') { history.back(); } else { hideLightboxDOM(); } }
    window.addEventListener('popstate', (e) => { if (lb.classList.contains('active')) { hideLightboxDOM(); } else if (sheet.classList.contains('open')) { hideSheetDOM(); } });
    lbContainer.addEventListener('click', (e) => { if(e.target !== lbImg && currentScale === 1 && !e.target.closest('.lightbox-nav')) closeLightboxForce(); });
    function getDistance(touches) { return Math.hypot(touches[0].pageX - touches[1].pageX, touches[0].pageY - touches[1].pageY); }
