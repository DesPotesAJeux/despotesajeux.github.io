<html lang="fr">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Des Potes à Jeux</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Shadows+Into+Light&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-beige: #f3f1e5;
            --text-brown: #4a4a4a;
            --green-deep: #3a6351;
            --wood-brown: #bc8f63; 
            --wood-highlight: #dbb38a;
            --fb-blue: #1877F2;
            --wa-green: #25D366; 
            --myludo-color: #2c3e50; 
        }

        body {
            margin: 0; background-color: #1a1a1a;
            display: flex; justify-content: center;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-brown); overflow: hidden;
            touch-action: manipulation;
        }

        .phone {
            width: 100%; max-width: 414px; 
            height: 100vh; height: 100dvh;
            background: var(--bg-beige); position: relative;
            overflow: hidden; display: flex; flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .main-wrapper {
            display: flex; flex-direction: column; height: 100%; width: 100%;
            transition: filter 0.4s ease;
        }
        .main-wrapper.blurred { filter: blur(5px); }

        /* --- HERO --- */
        .hero-container { width: 100%; flex-shrink: 0; background: var(--bg-beige); position: relative; }
        .hero { 
            width: 100%; 
            height: 42vh; min-height: 250px; max-height: 340px;
            background: url('hero.png') center center / cover no-repeat; 
            position: relative; z-index: 1; 
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none; pointer-events: none;
        }

        .rdv-card {
            background: rgba(255, 252, 240, 0.98); width: 85%;
            padding: 12px 15px; border-radius: 18px;
            position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%); display: flex; align-items: center;
            box-shadow: 0 10px 30px rgba(74, 60, 47, 0.15); border: 1px solid white;
            z-index: 10; pointer-events: auto;
        }

        .rdv-info p { margin: 0; font-size: 0.9rem; font-weight: 700; color: var(--green-deep); line-height: 1.3; }
        .rdv-info a { color: var(--green-deep); text-decoration: none; font-weight: 600; font-size: 0.8rem; }
        .rdv-info a .underline { text-decoration: underline; }

        /* --- CONTENU --- */
        .content {
            background: var(--bg-beige); padding: 45px 0 100px 0;
            position: relative; flex-grow: 1; overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .quote-box { padding: 15px 30px; text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; }
        .quote-text { font-family: 'Shadows Into Light', cursive; font-size: 1.5rem; line-height: 1.2; color: var(--green-deep); margin: 0; }
        .separator { width: 50px; height: 3px; background: var(--wood-highlight); margin: 12px auto; border-radius: 10px; opacity: 0.6; }

        .btn-ludotheque {
            background: var(--wood-brown); color: white; border: none; 
            padding: 10px 22px; border-radius: 50px;
            font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(188, 143, 99, 0.3); cursor: pointer; transition: transform 0.2s;
        }

        /* --- LIGHTBOX --- */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; display: none; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s ease; cursor: pointer;
        }
        .lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.17, 0.84, 0.44, 1), opacity 0.2s ease; cursor: default; }
        .lightbox.active { opacity: 1; }
        .lightbox.active img { transform: scale(1); }
        .lightbox-close { position: absolute; top: 25px; right: 25px; color: #ffffff; font-size: 1.8rem; background: rgba(0,0,0,0.6); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 110; cursor: pointer; }

        /* --- BOTTOM SHEET --- */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 25; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .bottom-sheet { 
            position: absolute; top: 100%; left: 0; width: 100%; height: 85vh; 
            background: white; z-index: 30; border-top-left-radius: 35px; border-top-right-radius: 35px; 
            display: flex; flex-direction: column; will-change: transform;
            transition: transform 0.4s cubic-bezier(0.17, 0.84, 0.44, 1);
        }
        .bottom-sheet.open { transform: translateY(-100%); }
        .sheet-header { width: 100%; padding: 20px 0 10px; flex-shrink: 0; }
        .sheet-handle { width: 45px; height: 6px; background: #e0e0e0; border-radius: 10px; margin: 0 auto; }
        .sheet-body { padding: 0 25px 40px; overflow-y: auto; flex-grow: 1; -webkit-overflow-scrolling: touch; }
        .sheet-content-title { font-family: 'Shadows Into Light', cursive; color: var(--green-deep); font-size: 2.6rem; margin: 10px 0 30px; text-align: center; position: relative; }
        .sheet-content-title::after { content: ''; display: block; width: 50px; height: 4px; background: var(--wood-brown); margin: 10px auto 0; border-radius: 5px; }

        .panel-card { background: var(--bg-beige); padding: 20px; border-radius: 20px; margin: 20px 0; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }

        /* --- HISTOIRE --- */
        .phase-label { font-size: 0.8rem; font-weight: 700; color: var(--wood-brown); text-transform: uppercase; letter-spacing: 2px; margin: 35px 0 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .phase-label.first { margin-top: 5px; }
        .phase-label::before, .phase-label::after { content: ''; flex-grow: 1; height: 1px; background: var(--wood-highlight); opacity: 0.8; max-width: 30px; min-width: 10px; }
        .phase-title { font-family: 'Quicksand', sans-serif; color: var(--green-deep); font-size: 1.2rem; font-weight: 700; text-align: center; margin: 0 0 15px; display: flex; align-items: center; justify-content: center; gap: 10px; white-space: nowrap; }
        .grimoire-text { text-align: center; line-height: 1.6; font-size: 0.95rem; margin-top: 0; }

        /* --- PHOTOS --- */
        .photo-section-title { text-align: center; color: var(--green-deep); font-family: 'Shadows Into Light', cursive; font-size: 1.8rem; margin: 15px 0 10px 0; padding-top: 20px; border-top: 1px dashed rgba(0,0,0,0.1); }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 0 3px 20px; }
        .photo-grid-item { position: relative; width: 100%; aspect-ratio: 1 / 1; cursor: pointer; overflow: hidden; background: #ddd; border-radius: 2px; }
        .photo-grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* --- CONTACTS (ORIGINAL DESIGN) --- */
        .contact-person { display: flex; flex-direction: column; padding: 12px 15px; width: 100%; box-sizing: border-box; background: #ffffff; border: 2px solid var(--wood-brown); border-radius: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .contact-top { display: flex; align-items: center; gap: 12px; width: 100%; }
        .contact-person .avatar { width: 40px; height: 40px; background: var(--wood-highlight); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1rem; flex-shrink: 0; }
        .contact-person .avatar.mail-icon { background: var(--wood-brown); }
        .contact-person .avatar.fb-icon { background: var(--fb-blue); }
        .contact-person .avatar.wa-icon { background: var(--wa-green); }
        .contact-top h4 { margin: 0; color: var(--green-deep); font-size: 1.1rem; flex-grow: 1; min-width: 80px; }
        .contact-bottom { width: 100%; padding-top: 8px; text-align: left; }
        .contact-bottom span { font-size: 0.75rem; color: var(--text-brown); font-weight: 600; opacity: 0.9; display: block; }
        .call-btn { background: var(--green-deep); color: white; text-decoration: none; width: 100px; height: 34px; border-radius: 50px; font-weight: 700; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 6px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(58, 99, 81, 0.2); }

        /* --- AGENDA --- */
        .cal-list { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; } 
        .cal-item { display: flex; align-items: center; gap: 12px; background: #ffffff; padding: 10px 15px; border-radius: 12px; border-left: 4px solid var(--wood-brown); box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .cal-item .date { font-weight: 700; color: var(--green-deep); font-size: 1rem; text-transform: capitalize; margin-bottom: 2px; }
        .cal-item .time { font-size: 0.8rem; color: var(--text-brown); line-height: 1.4; }
        .cal-item .time a { color: var(--green-deep); text-decoration: underline; font-weight: 600; }

        .footer-nav { position: absolute; bottom: 0; left: 0; width: 100%; background: var(--green-deep); display: flex; justify-content: space-around; align-items: center; padding: 15px 0 25px 0; border-top: 3px solid var(--wood-brown); z-index: 20; }
        .menu-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; }
        .icon-box { width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 14px; background: var(--wood-brown); margin-bottom: 6px; color: #ffffff; font-size: 1.3rem; box-shadow: 0 4px 8px rgba(0,0,0,0.25); transition: all 0.2s cubic-bezier(0.17, 0.84, 0.44, 1); }
        .menu-item span { font-weight: 700; font-size: 0.5rem; color: #ffffff; text-transform: uppercase; letter-spacing: 0.5px; }

        @media (min-width: 768px) {
            body { background-color: var(--bg-beige); overflow: auto; }
            .phone { max-width: 100%; height: 100vh; box-shadow: none; border-radius: 0; }
            .hero { width: 100%; max-width: 550px; height: 550px; border-radius: 30px; margin: 20px auto; }
            .footer-nav { order: -1; position: relative; padding: 15px 50px; border-top: none; border-bottom: 4px solid var(--wood-brown); justify-content: center; gap: 20px; }
            .bottom-sheet { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); height: auto; max-height: 85vh; width: 700px; border-radius: 25px; opacity: 0; display: none; }
            .bottom-sheet.open { display: flex; opacity: 1; transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>

<div class="phone">
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-close" onclick="closeLightboxForce()"><i class="fa-solid fa-xmark"></i></div>
        <img id="lightboxImg" src="" alt="Aperçu plein écran" oncontextmenu="return false;">
    </div>

    <div class="overlay" id="overlay" onclick="closeSheet()"></div>
    
    <div class="main-wrapper" id="mainWrapper">
        <div class="hero-container">
            <div class="hero">
                <div class="rdv-card">
                    <div style="font-size: 1.5rem; margin-right: 12px;">🎲</div>
                    <div class="rdv-info">
                        <b style="font-size:0.7rem; color:var(--wood-brown); text-transform:uppercase;">Prochain Rdv</b>
                        <p id="next-rdv-banner">Calcul en cours...</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="content">
            <div class="quote-box">
                <p class="quote-text">"Ici on ne compte pas les points,<br>on compte les <strong>souvenirs</strong>."</p>
                <div class="separator"></div>
                <button class="btn-ludotheque" onclick="openSheet('ludotheque')">
                    <i class="fa-solid fa-dice-d20"></i> Découvrir nos jeux
                </button>
                <p style="font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; opacity: 0.4; margin-top: 5px;">
                    Association loi 1901 • Plouay • Bretagne
                </p>
            </div>
        </div>

        <nav class="footer-nav">
            <div class="menu-item" onclick="openSheet('histoire')"><div class="icon-box"><i class="fa-solid fa-book-open"></i></div><span>Histoire</span></div>
            <div class="menu-item" onclick="openSheet('adhesion')"><div class="icon-box"><i class="fa-solid fa-user-check"></i></div><span>Adhésion</span></div>
            <div class="menu-item" onclick="openSheet('cal')"><div class="icon-box"><i class="fa-solid fa-calendar-day"></i></div><span>Agenda</span></div>
            <div class="menu-item" onclick="openSheet('photos')"><div class="icon-box"><i class="fa-solid fa-camera-retro"></i></div><span>Photos</span></div>
            <div class="menu-item" onclick="openSheet('contact')"><div class="icon-box"><i class="fa-solid fa-envelope"></i></div><span>Contact</span></div>
        </nav>
    </div>

    <div class="bottom-sheet" id="bottomSheet">
        <div class="sheet-header"><div class="sheet-handle"></div></div>
        <div class="sheet-body" id="sheetBody"><div id="sheetContent"></div></div>
    </div>
</div>

<script>
    const NB_PHOTOS_SORTIES = 19; 
    const NB_PHOTOS_JEUX = 20;    
    let currentGallery = [];
    let currentPhotoIndex = 0;

    function getNextLastFridays() {
        let dates = [];
        let now = new Date();
        let currentYear = now.getFullYear();
        let currentMonth = now.getMonth();
        while (dates.length < 4) {
            let d = new Date(currentYear, currentMonth + 1, 0); 
            while (d.getDay() !== 5) { d.setDate(d.getDate() - 1); }
            let checkDate = new Date(d); checkDate.setHours(23, 59, 59);
            if (checkDate >= now) { dates.push(new Date(d)); }
            currentMonth++;
        }
        return dates;
    }

    const upcomingDates = getNextLastFridays();
    const dateOptions = { weekday: 'long', day: 'numeric', month: 'long' };
    let rawDate = upcomingDates[0].toLocaleDateString('fr-FR', dateOptions);
    document.getElementById('next-rdv-banner').innerHTML = `${rawDate.charAt(0).toUpperCase() + rawDate.slice(1)} 20h30<br><a href="http://googleusercontent.com/maps.google.com/5" target="_blank">📍 <span class="underline">Maison des Associations</span></a>`;

    let agendaHTML = '<div class="cal-list">' + upcomingDates.map(date => {
        let formatted = date.toLocaleDateString('fr-FR', dateOptions);
        return `<div class="cal-item"><i class="fa-regular fa-calendar-check" style="color: var(--wood-brown); font-size: 1.4rem;"></i><div class="cal-content"><div class="date">${formatted.charAt(0).toUpperCase() + formatted.slice(1)}</div><div class="time">20h30 • <a href="http://googleusercontent.com/maps.google.com/5" target="_blank">Maison des Associations</a></div></div></div>`;
    }).join('') + '</div>';

    let photosSortiesHTML = '<div class="photo-grid">';
    for(let i=1; i<=NB_PHOTOS_SORTIES; i++) { photosSortiesHTML += `<div class="photo-grid-item" onclick="openLightbox('sortie${i}.jpg')"><img src="sortie${i}.jpg" loading="lazy"></div>`; }
    photosSortiesHTML += '</div>';

    let photosJeuxHTML = '<div class="photo-grid">';
    for(let i=1; i<=NB_PHOTOS_JEUX; i++) { photosJeuxHTML += `<div class="photo-grid-item" onclick="openLightbox('jeu${i}.jpg')"><img src="jeu${i}.jpg" loading="lazy"></div>`; }
    photosJeuxHTML += '</div>';

    const pagesData = {
        histoire: { 
            title: "Le Grimoire", 
            text: `<div class="panel-card">
                <div class="phase-label first">Phase 1</div><div class="phase-title"><span>La Pioche (2014)</span></div>
                <p class="grimoire-text">Tout a commencé au travail, un peu par hasard, en entendant des collègues débattre sur le jeu <b>Small World</b>. Très vite, le virus se transmet et les premières soirées jeux s'organisent chez les uns et les autres.</p>
                <div class="phase-label">Phase 2</div><div class="phase-title"><span>Le Coup de Maître (2015)</span></div>
                <p class="grimoire-text">L'aventure prend une nouvelle dimension avec l'acquisition du classique <b>Agricola</b>. Entre la gestion des champs et l'élevage de moutons en bois, la passion devient dévorante ! Très vite, <b>7 Wonders</b> rejoint la table pour des parties endiablées.</p>
                <div class="phase-label">Phase 3</div><div class="phase-title"><span>La Fondation (2019)</span></div>
                <p class="grimoire-text">Animés par l'envie de partager notre passion avec d'autres joueurs, nous sommes quatre amis à franchir le pas. L'association des "Potes à Jeux" naît officiellement. La petite tablée s'agrandit peu à peu pour accueillir de nouveaux joueurs de Plouay.</p>
                <div class="phase-label">Phase 4</div><div class="phase-title"><span>L'Envolée (2026)</span></div>
                <p class="grimoire-text">Nous voici aujourd'hui en <b>2026</b>. Une solide base de fidèles s'est créée, comptant désormais une <b>vingtaine d'adhérents</b> passionnés cette année. L'aventure ne fait que continuer avec vous !</p>
            </div>`
        },
        adhesion: { 
            title: "Rejoindre l'asso", 
            text: `<div class="panel-card">
                <p style="text-align:center; margin-top:0;">Devenir membre est simple et convivial !</p>
                <div style="background: rgba(220, 53, 69, 0.1); border: 2px solid rgba(220, 53, 69, 0.2); color: #dc3545; padding: 10px 15px; border-radius: 12px; text-align: center; font-weight: 700; margin: 15px auto; max-width: 280px; font-size: 0.9rem;"><i class="fa-solid fa-triangle-exclamation"></i> Autorisé aux plus de 18 ans</div>
                <div class="pricing-container">
                    <div class="price-card featured"><div class="amount">15€</div><p>Solo / an</p></div>
                    <div class="price-card featured"><div class="amount">20€</div><p>Couple / an</p></div>
                </div>
                <ul class="benefits-list" style="max-width: 280px; margin: 15px auto 0;">
                    <li><i class="fa-solid fa-circle-check"></i> Accès illimité aux soirées</li>
                    <li><i class="fa-solid fa-circle-check"></i> Première séance offerte</li>
                    <li><i class="fa-solid fa-circle-check"></i> Soirée escape game</li>
                    <li><i class="fa-solid fa-circle-check"></i> Repas de fin d'année</li>
                </ul>
            </div>`
        },
        cal: { title: "Agenda Ludique", text: `<div class="panel-card"><p style="text-align: center; color: var(--green-deep); margin-top: 0; font-size: 0.95rem;">On se retrouve chaque <b>dernier vendredi du mois</b>.</p>${agendaHTML}</div>` },
        photos: { title: "Souvenirs", text: `<div class="panel-card" style="padding:0;"><h3 class="photo-section-title first">Les Sorties</h3>${photosSortiesHTML}<h3 class="photo-section-title">Les Jeux</h3>${photosJeuxHTML}</div>` },
        contact: { 
            title: "Nous Contacter", 
            text: `<div class="panel-card">
                <div class="contact-person"><div class="contact-top"><div class="avatar"><i class="fa-solid fa-user"></i></div><h4>Julie</h4><a href="tel:+33620031771" class="call-btn">Appeler</a></div><div class="contact-bottom"><span>Présidente de l'association</span></div></div>
                <div class="contact-person"><div class="contact-top"><div class="avatar mail-icon"><i class="fa-solid fa-envelope-open-text"></i></div><h4>Email</h4><a href="mailto:despotesajeux@protonmail.com" class="call-btn mail-btn">Écrire</a></div><div class="contact-bottom"><span>Pour toute question ou demande</span></div></div>
                <div class="contact-person"><div class="contact-top"><div class="avatar fb-icon"><i class="fa-brands fa-facebook-f"></i></div><h4>Facebook</h4><a href="https://www.facebook.com/groups/despotesajeux/" target="_blank" class="call-btn fb-btn">Rejoindre</a></div><div class="contact-bottom"><span>Pour suivre la communauté</span></div></div>
                <div class="contact-person"><div class="contact-top"><div class="avatar wa-icon"><i class="fa-brands fa-whatsapp"></i></div><h4>WhatsApp</h4><a href="https://chat.whatsapp.com/GE6whGWavky2alGNskA5yL?mode=gi_t" target="_blank" class="call-btn wa-btn">Papoter</a></div><div class="contact-bottom"><span>Rejoindre le groupe de discussion</span></div></div>
            </div>` 
        },
        ludotheque: { 
            title: "Nos Ludothèques", 
            text: `<div class="panel-card">
                <p style="text-align: center; margin-top: 0; font-size: 0.95rem; line-height: 1.5;">Collections de nos membres sur <b>Myludo</b>.</p>
                <div class="contact-person"><div class="contact-top"><div class="avatar ludo-icon"><i class="fa-solid fa-dice"></i></div><h4>Julie</h4><a href="https://www.myludo.fr/#!/profil/julie-despotesajeux-39328" target="_blank" class="call-btn ludo-btn">Voir</a></div></div>
                <div class="contact-person"><div class="contact-top"><div class="avatar ludo-icon"><i class="fa-solid fa-puzzle-piece"></i></div><h4>Le Club</h4><a href="https://www.myludo.fr/#!/profil/des-potes-a-jeux-38379" target="_blank" class="call-btn ludo-btn">Voir</a></div></div>
            </div>` 
        }
    };

    const sheet = document.getElementById('bottomSheet');
    const overlay = document.getElementById('overlay');
    const sheetContent = document.getElementById('sheetContent');
    const sheetBody = document.getElementById('sheetBody');
    const mainWrapper = document.getElementById('mainWrapper');

    function openSheet(key) {
        sheetContent.innerHTML = `<h2 class="sheet-content-title">${pagesData[key].title}</h2>${pagesData[key].text}`;
        overlay.style.display = 'block'; mainWrapper.classList.add('blurred');
        setTimeout(() => { overlay.style.opacity = '1'; sheet.classList.add('open'); }, 10);
    }

    function closeSheet() {
        sheet.classList.remove('open'); overlay.style.opacity = '0'; mainWrapper.classList.remove('blurred');
        setTimeout(() => { overlay.style.display = 'none'; sheet.style.transform = ''; }, 400);
    }

    overlay.onclick = closeSheet;

    // --- LOGIQUE SWIPE DOWN FLUIDE (FIXED) ---
    let startY = 0; let isDragging = false;
    sheet.addEventListener('touchstart', (e) => { 
        if (sheetBody.scrollTop <= 0) { 
            startY = e.touches[0].clientY; isDragging = true; sheet.style.transition = 'none'; 
        } 
    }, { passive: true });

    sheet.addEventListener('touchmove', (e) => { 
        if (!isDragging) return; 
        let diff = e.touches[0].clientY - startY; 
        if (diff > 0) { 
            e.preventDefault(); 
            sheet.style.transform = `translateY(calc(-100% + ${diff}px))`; 
        } 
    }, { passive: false });

    sheet.addEventListener('touchend', (e) => { 
        if (!isDragging) return; 
        isDragging = false; 
        let diff = e.changedTouches[0].clientY - startY; 
        sheet.style.transition = "transform 0.4s cubic-bezier(0.17, 0.84, 0.44, 1)"; 
        if (diff > 100) closeSheet(); else sheet.style.transform = ''; 
    });

    // --- LIGHTBOX ---
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightboxImg');
    function openLightbox(src) { 
        lbImg.src = src; lb.style.display = 'flex'; 
        setTimeout(() => lb.classList.add('active'), 10); 
        const imgs = document.querySelectorAll('.photo-grid img'); 
        currentGallery = Array.from(imgs).map(i => i.getAttribute('src')); 
        currentPhotoIndex = currentGallery.indexOf(src); 
        history.pushState({modal: 'lb'}, ''); 
    }
    function closeLightboxForce() { lb.classList.remove('active'); setTimeout(() => lb.style.display='none', 300); if(history.state?.modal === 'lb') history.back(); }
    window.onpopstate = () => { lb.classList.remove('active'); setTimeout(() => lb.style.display='none', 300); };
    
    let lbStartX = 0;
    lb.ontouchstart = (e) => lbStartX = e.touches[0].clientX;
    lb.ontouchend = (e) => {
        let diff = lbStartX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50 && currentGallery.length > 1) {
            currentPhotoIndex = (currentPhotoIndex + (diff > 0 ? 1 : -1) + currentGallery.length) % currentGallery.length;
            lbImg.style.opacity = 0; setTimeout(() => { lbImg.src = currentGallery[currentPhotoIndex]; lbImg.style.opacity = 1; }, 150);
        }
    };
</script>
</body>
